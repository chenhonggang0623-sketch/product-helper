<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品文档智能问答助手</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f1f5f9; color: #1e293b; }

  .app { display: flex; flex-direction: column; height: 100vh; }
  header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 18px; font-weight: 600; color: #0f172a; }
  header span { font-size: 13px; color: #64748b; margin-left: auto; }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Chat Panel ── */
  .chat-panel { flex: 2; display: flex; flex-direction: column; min-width: 0; background: #fff; border-right: 1px solid #e2e8f0; }

  .category-bar { display: flex; align-items: center; gap: 8px; padding: 8px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; font-size: 13px; }
  .category-bar label { color: #64748b; font-weight: 500; }
  .category-bar select { padding: 4px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background: #fff; color: #1e293b; outline: none; cursor: pointer; }
  .category-bar select:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }

  .session-bar { display: flex; align-items: center; gap: 4px; padding: 10px 20px 0; background: #fff; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; overflow-x: auto; }
  .session-bar::-webkit-scrollbar { height: 3px; }
  .session-bar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  .session-tab { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; font-size: 13px; border: 1px solid #e2e8f0; border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; color: #64748b; background: #f8fafc; white-space: nowrap; user-select: none; transition: all 0.15s; }
  .session-tab:hover { background: #f1f5f9; }
  .session-tab.active { color: #2563eb; background: #fff; border-color: #e2e8f0; border-bottom-color: #fff; font-weight: 500; }
  .session-tab .close { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; font-size: 11px; line-height: 1; color: #94a3b8; cursor: pointer; }
  .session-tab .close:hover { background: #e2e8f0; color: #475569; }
  .session-add { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; color: #64748b; cursor: pointer; border: 1px dashed #cbd5e1; background: transparent; flex-shrink: 0; }
  .session-add:hover { border-color: #2563eb; color: #2563eb; }
  .session-delete { display: inline-flex; align-items: center; gap: 4px; margin-left: auto; padding: 5px 10px; font-size: 12px; color: #ef4444; background: none; border: 1px solid #fecaca; border-radius: 6px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .session-delete:hover { background: #fef2f2; }

  .messages { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
  .messages-inner { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .msg.user .msg-avatar { background: #2563eb; color: #fff; }
  .msg.assistant .msg-avatar { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }

  .msg-bubble { padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user .msg-bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: #f8fafc; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }

  .msg-bubble img { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #e2e8f0; }
  .msg-source { font-size: 12px; color: #94a3b8; margin-top: 6px; padding-top: 6px; border-top: 1px solid #e2e8f0; }

  .input-area { display: flex; gap: 8px; padding: 16px 20px; background: #fff; border-top: 1px solid #e2e8f0; }
  .input-area input { flex: 1; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
  .input-area input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .input-area button { padding: 10px 20px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .input-area button:hover { background: #1d4ed8; }
  .input-area button:disabled { background: #94a3b8; cursor: not-allowed; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #94a3b8; text-align: center; }
  .empty-state h3 { font-size: 18px; font-weight: 500; color: #64748b; }
  .empty-state p { font-size: 14px; margin-top: 4px; }

  .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: typing 1.4s infinite both; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }

  /* ── Admin Panel ── */
  .admin-panel { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; background: #fff; overflow-y: auto; }
  .admin-section { padding: 20px; border-bottom: 1px solid #e2e8f0; }
  .admin-section h3 { font-size: 14px; font-weight: 600; color: #0f172a; margin-bottom: 12px; }

  .upload-area input[type="file"] { width: 100%; padding: 8px; border: 1px dashed #cbd5e1; border-radius: 6px; font-size: 13px; cursor: pointer; margin-bottom: 10px; }
  .upload-area input[type="file"]:hover { border-color: #2563eb; }
  .upload-area select { width: 100%; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; margin-bottom: 10px; background: #fff; color: #1e293b; outline: none; }

  .btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
  .btn-ghost { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
  .btn-ghost:hover { background: #f8fafc; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #dc2626; }

  .status-msg { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  .status-ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .status-warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
  .status-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

  /* ── 文档树 ── */
  .doc-tree { max-height: 300px; overflow-y: auto; font-size: 13px; }
  .tree-node { user-select: none; }
  .tree-folder { padding: 5px 0; color: #0f172a; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .tree-folder:hover { color: #2563eb; }
  .tree-folder .arrow { transition: transform 0.15s; font-size: 10px; color: #94a3b8; width: 14px; text-align: center; }
  .tree-folder .arrow.open { transform: rotate(90deg); }
  .tree-folder .del-cat { margin-left: auto; font-size: 12px; color: #ef4444; opacity: 0; transition: opacity 0.1s; cursor: pointer; }
  .tree-folder:hover .del-cat { opacity: 1; }
  .tree-children { padding-left: 20px; }
  .tree-file { padding: 4px 0; color: #475569; display: flex; align-items: center; gap: 6px; }
  .tree-file .del-file { margin-left: auto; font-size: 11px; color: #ef4444; opacity: 0; transition: opacity 0.1s; cursor: pointer; }
  .tree-file:hover .del-file { opacity: 1; }
  .tree-file-icon { color: #2563eb; font-size: 12px; }
  .tree-empty { font-size: 13px; color: #94a3b8; text-align: center; padding: 20px 0; }

  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .admin-panel { width: 100%; max-height: 40vh; }
    .msg { max-width: 95%; }
    .session-bar { padding: 8px 10px 0; overflow-x: auto; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>📋 产品文档智能问答助手</h1>
    <span id="session-id-label">会话: —</span>
  </header>
  <div class="main">
    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="category-bar">
        <label for="chat-category">知识库过滤：</label>
        <select id="chat-category">
          <option value="">全部知识库</option>
        </select>
        <span style="font-size:12px;color:#94a3b8;">(切换后自动搜索对应分类)</span>
      </div>

      <div class="session-bar" id="session-bar"></div>

      <div class="messages" id="chat-messages">
        <div class="empty-state" id="empty-state">
          <h3>💬 开始新的对话</h3>
          <p>上传产品文档后在此提问</p>
        </div>
        <div class="messages-inner" id="messages-inner" style="display:none"></div>
      </div>

      <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." autofocus />
        <button id="send-btn">发送</button>
      </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel">
      <div class="admin-section upload-area">
        <h3>📤 上传文档</h3>
        <input type="file" id="file-input" accept=".txt,.md,.pdf,.docx,.xlsx,.xls" />
        <select id="category-input">
          <option value="">不指定分类（放入"未分类"）</option>
        </select>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-primary" id="upload-btn">上传并处理</button>
          <button class="btn btn-ghost" id="add-cat-btn">+ 新增分类</button>
        </div>
        <div id="upload-status"></div>
      </div>
      <div class="admin-section">
        <h3>📂 文档知识库</h3>
        <div class="doc-tree" id="doc-tree"><div class="tree-empty">暂无文档</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
let sessions = [];
let activeSessionId = null;
let isLoading = false;
let sessionCounter = 0;

// ═══════════════════════════════════════════════════════
//  Session management
// ═══════════════════════════════════════════════════════

function getActiveSession() {
  return sessions.find(s => s.id === activeSessionId) || null;
}

function getSessionIndex(id) {
  return sessions.findIndex(s => s.id === id);
}

async function createSession(switchTo = true) {
  try {
    const resp = await fetch('/api/session');
    const data = await resp.json();
    sessionCounter++;
    const session = {
      id: data.session_id,
      name: '会话 ' + sessionCounter,
      messages: [],
    };
    sessions.push(session);
    renderSessionBar();
    if (switchTo) {
      switchSession(session.id);
    }
    return session;
  } catch (e) {
    const fallbackId = 'local_' + Math.random().toString(36).slice(2, 10);
    sessionCounter++;
    const session = { id: fallbackId, name: '会话 ' + sessionCounter, messages: [] };
    sessions.push(session);
    renderSessionBar();
    if (switchTo) {
      switchSession(session.id);
    }
    return session;
  }
}

async function deleteSession(sessionId) {
  if (sessions.length <= 1) {
    const s = sessions[0];
    s.messages = [];
    try {
      await fetch('/api/session/' + sessionId, { method: 'DELETE' });
    } catch (e) { /* ignore */ }
    renderMessages();
    return;
  }
  const idx = getSessionIndex(sessionId);
  if (idx === -1) return;
  try {
    await fetch('/api/session/' + sessionId, { method: 'DELETE' });
  } catch (e) { /* ignore */ }
  sessions.splice(idx, 1);
  if (activeSessionId === sessionId) {
    const newIdx = Math.min(idx, sessions.length - 1);
    switchSession(sessions[newIdx].id);
  }
  renderSessionBar();
}

function switchSession(sessionId) {
  activeSessionId = sessionId;
  renderSessionBar();
  renderMessages();
  const s = getActiveSession();
  document.getElementById('session-id-label').textContent =
    '会话: ' + (s ? s.name : '—') + ' (' + sessionId.slice(0, 8) + '...)';
}

// ═══════════════════════════════════════════════════════
//  Docs tree
// ═══════════════════════════════════════════════════════

async function loadDocsTree() {
  try {
    const resp = await fetch('/api/docs-tree');
    const data = await resp.json();
    renderDocTree(data.tree || []);
    updateCategorySelectors(data.tree || []);
  } catch (e) {
    console.error('Failed to load docs tree:', e);
  }
}

function renderDocTree(tree) {
  const el = document.getElementById('doc-tree');
  if (!tree || tree.length === 0) {
    el.innerHTML = '<div class="tree-empty">暂无文档</div>';
    return;
  }
  el.innerHTML = tree.map((cat, ci) => {
    const children = (cat.children || []).map((file, fi) => {
      return '<div class="tree-file">'
        + '<span class="tree-file-icon">📄</span>'
        + '<span>' + escapeHtml(file.label) + '</span>'
        + '<span class="del-file" data-category="' + ci + '" data-file="' + escapeHtml(file.label) + '" title="删除文档">✕</span>'
        + '</div>';
    }).join('');
    return '<div class="tree-node">'
      + '<div class="tree-folder" data-folder="' + ci + '">'
      + '<span class="arrow open">▶</span>'
      + '<span>📁 ' + escapeHtml(cat.label) + '</span>'
      + '<span class="del-cat" data-category="' + escapeHtml(cat.label) + '" title="删除分类">🗑</span>'
      + '</div>'
      + '<div class="tree-children">' + children + '</div>'
      + '</div>';
  }).join('');

  // Toggle folders
  document.querySelectorAll('.tree-folder').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('del-cat') || e.target.classList.contains('del-file')) return;
      const children = el.nextElementSibling;
      const arrow = el.querySelector('.arrow');
      if (children.style.display === 'none') {
        children.style.display = 'block';
        arrow.classList.add('open');
      } else {
        children.style.display = 'none';
        arrow.classList.remove('open');
      }
    });
  });

  // Delete category
  document.querySelectorAll('.del-cat').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const cat = el.dataset.category;
      if (!confirm('确定删除分类 "' + cat + '" 及其所有文档向量？')) return;
      try {
        const resp = await fetch('/api/category/' + encodeURIComponent(cat), { method: 'DELETE' });
        const data = await resp.json();
        if (data.tree) renderDocTree(data.tree);
        updateCategorySelectors(data.tree || []);
      } catch (e) {
        alert('删除失败');
      }
    });
  });

  // Delete file
  document.querySelectorAll('.del-file').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const fname = el.dataset.file;
      if (!confirm('确定删除文档 "' + fname + '"？')) return;
      try {
        const resp = await fetch('/api/document/' + encodeURIComponent(fname), { method: 'DELETE' });
        const data = await resp.json();
        if (data.tree) renderDocTree(data.tree);
        updateCategorySelectors(data.tree || []);
      } catch (e) {
        alert('删除失败');
      }
    });
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateCategorySelectors(tree) {
  const cats = (tree || []).map(n => n.label);
  // Chat filter
  const chatSelect = document.getElementById('chat-category');
  const curVal = chatSelect.value;
  chatSelect.innerHTML = '<option value="">全部知识库</option>';
  cats.forEach(c => {
    chatSelect.innerHTML += '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>';
  });
  if (curVal) chatSelect.value = curVal;

  // Upload category
  const uploadSelect = document.getElementById('category-input');
  const upVal = uploadSelect.value;
  uploadSelect.innerHTML = '<option value="">不指定分类（放入"未分类"）</option>';
  cats.forEach(c => {
    // skip "未分类" in upload options
    if (c === '未分类') return;
    uploadSelect.innerHTML += '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>';
  });
  if (upVal) uploadSelect.value = upVal;
}

// ═══════════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════════

function renderSessionBar() {
  const bar = document.getElementById('session-bar');
  let html = '';
  sessions.forEach(s => {
    const active = s.id === activeSessionId ? ' active' : '';
    html += '<div class="session-tab' + active + '" data-id="' + s.id + '">'
         + s.name + '<span class="close" data-action="close" data-id="' + s.id + '">×</span></div>';
  });
  html += '<button class="session-add" id="btn-add-session" title="新建会话">+</button>';
  html += '<button class="session-delete" id="btn-del-session" title="删除当前会话">🗑 删除</button>';
  bar.innerHTML = html;

  document.querySelectorAll('.session-tab').forEach(el => {
    const sid = el.dataset.id;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('close')) return;
      switchSession(sid);
    });
  });
  document.querySelectorAll('.close').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteSession(el.dataset.id);
    });
  });
  document.getElementById('btn-add-session').addEventListener('click', () => createSession(true));
  document.getElementById('btn-del-session').addEventListener('click', () => {
    if (activeSessionId) deleteSession(activeSessionId);
  });
}

function renderMessages() {
  const s = getActiveSession();
  const emptyEl = document.getElementById('empty-state');
  const innerEl = document.getElementById('messages-inner');
  if (!s || s.messages.length === 0) {
    emptyEl.style.display = 'flex';
    innerEl.style.display = 'none';
    return;
  }
  emptyEl.style.display = 'none';
  innerEl.style.display = 'flex';
  innerEl.innerHTML = s.messages.map(m => {
    const roleClass = m.role === 'user' ? 'user' : 'assistant';
    const avatar = m.role === 'user' ? '👤' : '🤖';
    let sourceHtml = '';
    if (m.sources && m.sources.length > 0) {
      sourceHtml = '<div class="msg-source">📄 ' + m.sources.join(', ') + '</div>';
    }
    let imgHtml = '';
    if (m.images && m.images.length > 0) {
      imgHtml = m.images.map(img => '<img src="' + img + '" alt="文档图片" />').join('');
    }
    return '<div class="msg ' + roleClass + '">'
         + '<div class="msg-avatar">' + avatar + '</div>'
         + '<div class="msg-bubble">' + m.content + imgHtml + sourceHtml + '</div></div>';
  }).join('');
  document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
}

// ═══════════════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════════════

async function sendMessage(message) {
  const s = getActiveSession();
  if (!s) return;
  s.messages.push({ role: 'user', content: message, images: [], sources: [] });
  renderMessages();
  isLoading = true;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  sendBtn.textContent = '思考中...';
  s.messages.push({ role: 'assistant', content: '<div class="typing"><span></span><span></span><span></span></div>', images: [], sources: [] });
  renderMessages();
  try {
    const category = document.getElementById('chat-category').value;
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: s.id, message: message, category: category }),
    });
    const data = await resp.json();
    s.messages.pop();
    s.messages.push({ role: 'assistant', content: data.answer, images: data.images || [], sources: data.sources || [] });
    renderMessages();
  } catch (e) {
    s.messages.pop();
    s.messages.push({ role: 'assistant', content: '请求失败，请检查网络连接', images: [], sources: [] });
    renderMessages();
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    sendBtn.textContent = '发送';
  }
}

async function uploadFile() {
  const file = document.getElementById('file-input').files[0];
  if (!file) {
    document.getElementById('upload-status').innerHTML = '<div class="status-msg status-warn">⚠️ 请先选择要上传的文件</div>';
    return;
  }
  const uploadBtn = document.getElementById('upload-btn');
  uploadBtn.disabled = true;
  uploadBtn.textContent = '处理中...';
  const uploadStatus = document.getElementById('upload-status');
  uploadStatus.innerHTML = '';
  const formData = new FormData();
  formData.append('file', file);
  const cat = document.getElementById('category-input').value;
  if (cat) formData.append('category', cat);
  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await resp.json();
    uploadStatus.innerHTML = data.status === 'ok'
      ? '<div class="status-msg status-ok">✅ ' + data.message + '</div>'
      : '<div class="status-msg status-error">❌ ' + data.message + '</div>';
    if (data.tree) {
      renderDocTree(data.tree);
      updateCategorySelectors(data.tree);
    }
  } catch (e) {
    uploadStatus.innerHTML = '<div class="status-msg status-error">❌ 上传失败: ' + e.message + '</div>';
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.textContent = '上传并处理';
    document.getElementById('file-input').value = '';
  }
}

// ═══════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', async () => {
  await loadDocsTree();
  await createSession(true);
  // Upload
  document.getElementById('upload-btn').addEventListener('click', uploadFile);
  // Add category
  document.getElementById('add-cat-btn').addEventListener('click', async () => {
    const name = prompt('输入新分类名称：');
    if (name && name.trim()) {
      const val = name.trim();
      const fd = new FormData();
      fd.append('category', val);
      try {
        const resp = await fetch('/api/category', { method: 'POST', body: fd });
        const data = await resp.json();
        if (data.status === 'ok') {
          await loadDocsTree();
        } else {
          alert(data.message);
        }
      } catch (e) {
        alert('新增分类失败');
      }
    }
  });
  // Send
  const input = document.getElementById('user-input');
  document.getElementById('send-btn').addEventListener('click', () => {
    const msg = input.value.trim();
    if (msg && !isLoading) { input.value = ''; sendMessage(msg); }
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('send-btn').click(); }
  });
});
</script>
</body>
