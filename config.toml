# =============================================================================
# Product Helper 配置文件
# 用户在使用前修改此文件中的参数
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# 1. LLM 配置（兼容 OpenAI API 的模型），必须支持多模态
# ─────────────────────────────────────────────────────────────────────────────
LLM_API_KEY  = "sk-1e8a624481294865820cb6dea0099fd2"
LLM_BASE_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1"
LLM_MODEL    = "qwen-vl-max"

# ─────────────────────────────────────────────────────────────────────────────
# 2. Embedding 配置（用于文档向量化，兼容 OpenAI API）
# ─────────────────────────────────────────────────────────────────────────────
EMBEDDING_API_KEY      = "sk-1e8a624481294865820cb6dea0099fd2"
EMBEDDING_BASE_URL     = "https://dashscope.aliyuncs.com/compatible-mode/v1"
EMBEDDING_MODEL        = "text-embedding-v3"
EMBEDDING_DIMENSIONS   = 1024

# ─────────────────────────────────────────────────────────────────────────────
# 3. Qdrant 向量数据库配置
# ─────────────────────────────────────────────────────────────────────────────
QDRANT_HOST = "localhost"
QDRANT_PORT = 6333

# ─────────────────────────────────────────────────────────────────────────────
# 4. 数据目录
# ─────────────────────────────────────────────────────────────────────────────
UPLOAD_DIR        = "uploads"
IMAGE_DIR         = "extracted_images"
DOC_COLLECTION    = "documents"
SESSION_COLLECTION = "conversations"

# ─────────────────────────────────────────────────────────────────────────────
# 5. 文档分块参数
# ─────────────────────────────────────────────────────────────────────────────
CHUNK_SIZE    = 500
CHUNK_OVERLAP = 50

# ─────────────────────────────────────────────────────────────────────────────
# 6. RAG 上下文窗口参数
# ─────────────────────────────────────────────────────────────────────────────
RAG_TOP_K                = 8       # 每次检索返回的段落数
RAG_MIN_SCORE            = 0.35    # 最低相关度（低于此值回复"不清楚"）
RAG_MAX_HISTORY_ROUNDS   = 10      # 发给 LLM 的历史对话轮数
RAG_MAX_IMAGES           = 5       # 发给 LLM 的图片上限
RAG_MAX_TOKENS           = 4096    # LLM 回答最大 token 数

# ─────────────────────────────────────────────────────────────────────────────
# 7. 服务启动参数
# ─────────────────────────────────────────────────────────────────────────────
SERVER_HOST = "0.0.0.0"
SERVER_PORT = 8000
